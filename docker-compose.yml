services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      PORT: "8080"
      DB_PATH: /data/jinglelab.db
      TMP_DIR: /tmp/jinglelab
      ENABLE_HEALTH_SERVER: "1"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - jinglelab_data:/data

volumes:
  jinglelab_data:
  redis_data:
